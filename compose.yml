name: ${TASK_TRAIN_COMPOSE_PROJECT:-task_train}

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_train}
      POSTGRES_USER: ${POSTGRES_USER:-task_train}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run ./configure.sh before starting Docker Compose}
    ports:
      - "${TASK_TRAIN_DB_PORT:-5433}:5432"
    volumes:
      - task_train_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
      - ./sql:/workspace/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_train -d task_train"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-task_train}
      PGUSER: ${POSTGRES_USER:-task_train}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Run ./configure.sh before starting Docker Compose}
      SUPERVISOR_CONFIG: /tmp/agents.container.json
    working_dir: /workspace
    volumes:
      - .:/workspace
      - opencode_data:/home/app/.local/share/opencode
      - opencode_config:/home/app/.config/opencode
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-task_train}
      PGUSER: ${POSTGRES_USER:-task_train}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Run ./configure.sh before starting Docker Compose}
    ports:
      - "127.0.0.1:${TASK_TRAIN_WEB_PORT:-3000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  task_train_data:
  opencode_data:
  opencode_config:
