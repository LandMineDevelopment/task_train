services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: task_train
      POSTGRES_USER: task_train
      POSTGRES_PASSWORD: task_train_dev_only
    ports:
      - "5433:5432"
    volumes:
      - task_train_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
      - ./sql:/workspace/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_train -d task_train"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: task_train
      PGUSER: task_train
      PGPASSWORD: task_train_dev_only
      SUPERVISOR_CONFIG: supervisor/agents.container.json
    working_dir: /workspace
    volumes:
      - .:/workspace
      - opencode_data:/home/app/.local/share/opencode
      - opencode_config:/home/app/.config/opencode
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]

volumes:
  task_train_data:
  opencode_data:
  opencode_config:
